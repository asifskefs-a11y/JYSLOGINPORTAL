<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JYS - Jarn Yafoor School Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-white">

    <div class="app-container">
        <!-- LANDING VIEW -->
        <section id="view-landing" class="view-section active items-center justify-center p-4 flex-1">
            <div class="portal-container">
                <header class="text-center mb-12">
                    <div class="w-24 h-24 bg-white rounded-full mx-auto mb-4 flex items-center justify-center shadow-lg border-4 border-indigo-500 overflow-hidden relative">
                        <img src="logo.png" class="w-full h-full object-contain rounded-full" alt="JYS Logo" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.classList.add('flex');">
                        <div class="hidden absolute inset-0 items-center justify-center text-indigo-900 font-black text-xl">JYS</div>
                    </div>
                    <h1 class="text-3xl md:text-5xl font-black tracking-tight text-indigo-900 drop-shadow-md">Welcome To Jarn Yafoor School</h1>
                    <p class="text-lg md:text-xl mt-2 font-bold text-indigo-700 bg-white/30 backdrop-blur-sm inline-block px-4 py-1 rounded-full border border-white/50">JYS Login Portal</p>
                </header>

                <main class="portal-options">
                    <a href="visitor.html" class="flex flex-col items-center justify-center bg-slate-50 border border-slate-100 rounded-3xl p-8 transition-all duration-300 transform active:scale-95 hover:shadow-xl group text-center" style="text-decoration: none;">
                        <div class="bg-indigo-600 p-5 rounded-full mb-4 group-hover:bg-indigo-500 transition-colors shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                        </div>
                        <span class="text-2xl font-bold text-[#221851]">Visitor Entry</span>
                        <p class="text-sm mt-2 text-[#555555] font-medium">Register and track visitors</p>
                    </a>

                    <a href="staff-login.html" class="flex flex-col items-center justify-center bg-slate-50 border border-slate-100 rounded-3xl p-8 transition-all duration-300 transform active:scale-95 hover:shadow-xl group text-center" style="text-decoration: none;">
                        <div class="bg-purple-600 p-5 rounded-full mb-4 group-hover:bg-purple-500 transition-colors shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <span class="text-2xl font-bold text-[#221851]">Staff Portal</span>
                        <p class="text-sm mt-2 text-[#555555] font-medium">Access staff features</p>
                    </a>
                </main>

                <a href="admin.html" class="mt-12 text-sm text-[#221851] font-black hover:opacity-80 underline tracking-widest uppercase" style="text-decoration: none;">Admin Dashboard</a>
            </div>
        </section>

        <!-- FOOTER -->
        <footer class="mt-auto py-6 text-center text-[10px] opacity-40 w-full">
            &copy; 2026 Jarn Yafoor School Staff Management System
        </footer>
    </div>

    <script type="module" src="firebase_config.js?v=2.1"></script>
    <script type="module" src="ui_module.js?v=2.1"></script>
    <script type="module" src="auth_module.js?v=2.1"></script>
    <script type="module" src="attendance_module.js?v=2.1"></script>
    <script type="module" src="task_module.js?v=2.1"></script>
    <script type="module" src="admin_module.js?v=2.1"></script>
    <script type="module" src="export_module.js?v=2.1"></script>
    <script type="module" src="visitor_module.js?v=2.1"></script>
    <script type="module" src="init_module.js?v=2.1"></script>
</body>
</html>
