<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visitor Entry - JYS Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-white">
    <div class="app-container">
        <!-- VISITOR VIEW -->
        <section id="view-visitor" class="view-section p-4 active">
            <nav class="w-full flex items-center justify-between mb-8 pt-4">
                <a href="index.html" class="btn btn-outline" style="text-decoration: none;">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back</span>
                </a>
                <h2 class="text-xl font-bold">Visitor System</h2>
            </nav>

            <div class="w-full bg-white text-gray-800 rounded-3xl shadow-2xl overflow-hidden p-6">
                <div id="v-signin-area">
                    <h3 class="text-xl font-bold mb-6 text-center text-indigo-600">Visitor Entry</h3>
                    <form id="visitor-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-600">Visitor ID</label>
                                <input type="text" id="v-id" readonly class="w-full p-2 bg-gray-100 rounded-lg border text-indigo-600 font-mono text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-600">Date</label>
                                <input type="text" id="v-date" readonly class="w-full p-2 bg-gray-100 rounded-lg border text-sm">
                            </div>
                        </div>
                        <input type="text" id="v-name" placeholder="Full Name" required class="w-full p-2 border rounded-lg text-sm">
                        <input type="tel" id="v-mobile" placeholder="Mobile Number" required class="w-full p-2 border rounded-lg text-sm">
                        <input type="text" id="v-company" placeholder="Company Name" required class="w-full p-2 border rounded-lg text-sm">
                        <textarea id="v-purpose" placeholder="Purpose of Visit" required class="w-full p-2 border rounded-lg text-sm h-20"></textarea>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-xs font-bold text-gray-600">Signature</label>
                                <button type="button" onclick="clearVisitorSig()" class="text-[10px] text-red-500 font-bold uppercase">Clear</button>
                            </div>
                            <div class="canvas-wrapper">
                                <canvas id="v-sig-pad" class="w-full h-32 border-2 border-dashed border-gray-200 rounded-lg bg-gray-50"></canvas>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-lg active:bg-indigo-700 transition">Confirm Sign-In</button>
                    </form>
                </div>

                <div id="v-signout-area" class="hidden text-center py-6">
                    <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-full mx-auto flex items-center justify-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    </div>
                    <h3 class="text-xl font-bold">Active Session</h3>
                    <p class="text-gray-500 mb-6 text-sm">Welcome back, <span id="v-active-name" class="text-indigo-600 font-bold"></span>!</p>
                    <div class="bg-gray-50 rounded-xl p-4 mb-6 text-left text-xs border">
                        <div class="flex justify-between mb-1"><span>ID:</span> <span id="v-active-id" class="font-bold"></span></div>
                        <div class="flex justify-between"><span>Time In:</span> <span id="v-active-timein" class="font-bold"></span></div>
                    </div>
                    <button id="v-signout-btn" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold text-lg active:bg-orange-600 transition">Sign Out Now</button>
                </div>
            </div>
        </section>

        <!-- FOOTER -->
        <footer class="mt-auto py-6 text-center text-[10px] opacity-40 w-full">
            &copy; 2026 Jarn Yafoor School Staff Management System
        </footer>
    </div>
    <script type="module" src="firebase_config.js?v=2.1"></script>
    <script type="module" src="ui_module.js?v=2.1"></script>
    <script type="module" src="auth_module.js?v=2.1"></script>
    <script type="module" src="attendance_module.js?v=2.1"></script>
    <script type="module" src="task_module.js?v=2.1"></script>
    <script type="module" src="admin_module.js?v=2.1"></script>
    <script type="module" src="export_module.js?v=2.1"></script>
    <script type="module" src="visitor_module.js?v=2.1"></script>
    <script type="module" src="init_module.js?v=2.1"></script>
</body>
</html>
