<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolLog - Visitor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        canvas {
            border: 2px dashed #e2e8f0;
            background-color: #f8fafc;
            touch-action: none;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <!-- Header -->
    <header class="w-full max-w-2xl flex items-center justify-between mb-8 text-white">
        <a href="index.html" class="flex items-center space-x-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            <span>Back</span>
        </a>
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center">
                <span class="text-indigo-600 font-bold text-xs">LOGO</span>
            </div>
            <h1 class="text-2xl font-bold">SchoolLog</h1>
        </div>
    </header>

    <main class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden">
        <!-- Sign-In Form -->
        <div id="signin-form-container" class="p-6 md:p-10">
            <h2 class="text-3xl font-extrabold text-gray-800 mb-6 text-center">Visitor Sign-In</h2>
            <form id="signin-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Visitor ID</label>
                        <input type="text" id="visitor-id" readonly class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-indigo-600 font-mono font-bold outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Date & Time-In</label>
                        <input type="text" id="entry-timestamp" readonly class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Full Name</label>
                        <input type="text" id="name" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Mobile Number</label>
                        <input type="tel" id="mobile" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Company Name</label>
                    <input type="text" id="company" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Purpose of Visit</label>
                    <textarea id="purpose" required rows="2" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition"></textarea>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-semibold text-gray-600">Digital Signature</label>
                        <button type="button" id="clear-canvas" class="text-xs text-red-500 font-bold uppercase tracking-wider">Clear</button>
                    </div>
                    <canvas id="signature-pad" class="w-full h-40 rounded-xl cursor-crosshair"></canvas>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transform transition active:scale-95 shadow-lg">
                    Confirm Entry
                </button>
            </form>
        </div>

        <!-- Sign-Out View -->
        <div id="signout-view" class="hidden p-10 text-center">
            <div class="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full mx-auto flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Visitor Sign-Out</h2>
            <p class="text-gray-500 mb-8">Welcome back, <span id="active-visitor-name" class="text-indigo-600 font-bold"></span>. Scanning your QR to exit?</p>

            <div class="bg-gray-50 rounded-2xl p-6 mb-8 text-left space-y-3 border border-gray-100">
                <div class="flex justify-between text-sm"><span class="text-gray-400">Visitor ID:</span> <span id="out-id" class="font-bold"></span></div>
                <div class="flex justify-between text-sm"><span class="text-gray-400">Time-In:</span> <span id="out-timein" class="font-bold"></span></div>
                <div class="flex justify-between text-sm"><span class="text-gray-400">Current Time (Exit):</span> <span id="out-timeout" class="font-bold text-red-500"></span></div>
            </div>

            <button id="signout-btn" class="w-full bg-red-500 text-white py-4 rounded-2xl font-bold text-lg hover:bg-red-600 transform transition active:scale-95 shadow-lg">
                Sign Out Now
            </button>
        </div>

        <!-- Success Message -->
        <div id="success-view" class="hidden p-10 text-center">
            <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full mx-auto flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Process Complete</h2>
            <p id="success-msg" class="text-gray-500 mb-8"></p>
            <a href="index.html" class="inline-block bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Return Home</a>
        </div>
    </main>

    <script>
        const signinFormContainer = document.getElementById('signin-form-container');
        const signoutView = document.getElementById('signout-view');
        const successView = document.getElementById('success-view');
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');

        // Check for active visitor
        window.onload = () => {
            const activeVisitor = JSON.parse(localStorage.getItem('activeVisitor'));
            if (activeVisitor) {
                showSignOut(activeVisitor);
            } else {
                initSignIn();
            }
            resizeCanvas();
        };

        function initSignIn() {
            signinFormContainer.classList.remove('hidden');
            const now = new Date();
            const year = now.getFullYear();
            const rand = Math.random().toString(36).substring(2, 5).toUpperCase();
            document.getElementById('visitor-id').value = `VIS-${year}-X${rand}`;
            document.getElementById('entry-timestamp').value = now.toLocaleString();
            setupSignature();
        }

        function showSignOut(visitor) {
            signoutView.classList.remove('hidden');
            signinFormContainer.classList.add('hidden');
            document.getElementById('active-visitor-name').innerText = visitor.name;
            document.getElementById('out-id').innerText = visitor.id;
            document.getElementById('out-timein').innerText = visitor.timeIn;

            // Auto-update time-out
            const updateTime = () => {
                document.getElementById('out-timeout').innerText = new Date().toLocaleTimeString();
            };
            updateTime();
            setInterval(updateTime, 1000);
        }

        // Signature logic
        let drawing = false;
        function setupSignature() {
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#312e81';

            const start = (e) => {
                drawing = true;
                ctx.beginPath();
                const pos = getPos(e);
                ctx.moveTo(pos.x, pos.y);
            };
            const move = (e) => {
                if (!drawing) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };
            const stop = () => drawing = false;

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0]); });
            canvas.addEventListener('touchend', stop);

            document.getElementById('clear-canvas').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
        }

        // Form Submission
        document.getElementById('signin-form').onsubmit = (e) => {
            e.preventDefault();
            const visitorData = {
                id: document.getElementById('visitor-id').value,
                timeIn: document.getElementById('entry-timestamp').value,
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value,
                company: document.getElementById('company').value,
                purpose: document.getElementById('purpose').value,
                signature: canvas.toDataURL()
            };
            localStorage.setItem('activeVisitor', JSON.stringify(visitorData));

            signinFormContainer.classList.add('hidden');
            successView.classList.remove('hidden');
            document.getElementById('success-msg').innerText = "Entry recorded successfully. Please proceed.";
        };

        // Sign Out Action
        document.getElementById('signout-btn').onclick = () => {
            localStorage.removeItem('activeVisitor');
            signoutView.classList.add('hidden');
            successView.classList.remove('hidden');
            document.getElementById('success-msg').innerText = "Sign-out successful. Thank you for your visit!";
        };
    </script>
</body>
</html>
